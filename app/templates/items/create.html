{% extends 'base.html' %}

{% block title %}Tambah Item - Sistem Buffer Stock{% endblock %}
{% block page_title %}Tambah Item{% endblock %}

{% block content %}
<div class="section">
    <div class="card">
        <div class="card-header">
            <h3>Form Tambah Item Baru</h3>
        </div>
        
        <form method="POST" class="form">
            <div class="form-row">
                <div class="form-group">
                    <label for="kode_item">Kode Item *</label>
                    <input type="text" id="kode_item" name="kode_item" required placeholder="ITM-XXXX">
                </div>
                <div class="form-group">
                    <label for="nama_item">Nama Item *</label>
                    <input type="text" id="nama_item" name="nama_item" required placeholder="Nama item">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="kategori">Kategori *</label>
                    <select id="kategori" name="kategori" required>
                        <option value="">Pilih Kategori</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                        <option value="Spare Part">Spare Part</option>
                        <option value="Raw Material">Raw Material</option>
                        <option value="Consumable">Consumable</option>
                        <option value="Safety Equipment">Safety Equipment</option>
                        <option value="Tools">Tools</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="unit">Unit</label>
                    <input type="text" id="unit" name="unit" value="PCS" placeholder="PCS/KG/Unit">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="lokasi_rak">Lokasi Rak</label>
                    <input type="text" id="lokasi_rak" name="lokasi_rak" placeholder="RACK-A1">
                </div>
            </div>
            
            <div class="form-group">
                <label for="supplier">Supplier</label>
                <input type="text" id="supplier" name="supplier" placeholder="Nama supplier">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Simpan
                </button>
                <a href="{{ url_for('main.items') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Batal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
