{% extends 'base.html' %}

{% block title %}Tambah Kriteria - Sistem Buffer Stock{% endblock %}
{% block page_title %}Tambah Kriteria{% endblock %}

{% block content %}
<div class="section">
    <div class="card">
        <div class="card-header">
            <h3>Form Tambah Kriteria Baru</h3>
        </div>
        
        <form method="POST" class="form">
            <div class="form-row">
                <div class="form-group">
                    <label for="kode_kriteria">Kode Kriteria *</label>
                    <input type="text" id="kode_kriteria" name="kode_kriteria" required placeholder="C1, C2, ...">
                </div>
                <div class="form-group">
                    <label for="nama_kriteria">Nama Kriteria *</label>
                    <input type="text" id="nama_kriteria" name="nama_kriteria" required placeholder="Nama kriteria">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="bobot">Bobot *</label>
                    <input type="number" id="bobot" name="bobot" step="0.01" min="0" max="1" required placeholder="0.00 - 1.00">
                    <small>Total bobot semua kriteria harus = 1.0</small>
                </div>
                <div class="form-group">
                    <label for="tipe">Tipe *</label>
                    <select id="tipe" name="tipe" required>
                        <option value="">Pilih Tipe</option>
                        <option value="benefit">Benefit (Semakin tinggi semakin baik)</option>
                        <option value="cost">Cost (Semakin rendah semakin baik)</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="keterangan">Keterangan</label>
                <textarea id="keterangan" name="keterangan" rows="3" placeholder="Penjelasan kriteria..."></textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Simpan
                </button>
                <a href="{{ url_for('main.criteria') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Batal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
